<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar dashboard-sidebar">
            <div class="sidebar-brand">
                <img src="images/dav.jpg" alt="DAV Logo" class="brand-logo">
                <div>
                    <h2>STUDENT PORTAL</h2>
                    <p>Student insights in one place</p>
                </div>
            </div>
            <nav class="sidebar-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="index.html">Students</a>
                <a href="attendance.html" class="active">Attendance</a>
                <a href="marks.html">Marks</a>
                <a href="reports.html">Reports</a>
            </nav>
            <div class="sidebar-footer">
                <p>DAV College</p>
                <button onclick="logout()" style="width: 100%; padding: 8px; background: #dc2626; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; margin-top: 12px;">Logout</button>
            </div>
        </aside>
        <main class="main-content">
            <div class="dashboard-header">
                <div>
                    <h1>Attendance</h1>
                    <p>Track daily attendance and make quick updates for each student.</p>
                </div>
                <div class="header-controls">
                    <div class="quick-links">
                        <a href="index.html">Students</a>
                        <a href="attendance.html" class="active">Attendance</a>
                        <a href="marks.html">Marks</a>
                        <a href="reports.html">Reports</a>
                    </div>
                    <input type="text" id="attendanceSearch" placeholder="Search Attendance...">
                </div>
            </div>
            <div class="content-area centered-content">
                <div class="form-card">
                    <h3>Record Attendance</h3>
                    <form id="attendanceForm">
                        <select id="attendanceStudent" required>
                            <option value="">Select Student</option>
                        </select>
                        <input type="date" id="attendanceDate" required>
                        <select id="attendanceStatus" required>
                            <option value="Present">Present</option>
                            <option value="Absent">Absent</option>
                        </select>
                        <button type="submit">Save Attendance</button>
                    </form>
                </div>
                <div class="table-card">
                    <h3>Attendance Records</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Roll No</th>
                                <th>Name</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="auth.js"></script>
    <script src="attendance.js"></script>
</body>
</html>
