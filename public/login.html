<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            font-family: Inter, system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(15, 23, 42, 0.2);
            padding: 36px;
        }

        .login-card h1 {
            margin: 0 0 6px;
            font-size: 28px;
            color: #0f172a;
        }

        .login-card p.description {
            margin: 0 0 28px;
            color: #475569;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #0f172a;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            background: #f8fafc;
            color: #0f172a;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.12);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.2);
        }

        .error-message {
            display: none;
            margin: 0 0 16px;
            color: #dc2626;
            font-size: 13px;
            text-align: center;
        }

        .info-text {
            margin-top: 18px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
            line-height: 1.6;
        }

        .credentials {
            margin-top: 12px;
            padding: 14px;
            border-radius: 14px;
            background: #f1f5f9;
            color: #334155;
            font-size: 13px;
            line-height: 1.5;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Welcome Back</h1>
        <p class="description">Sign in to your student management portal and access dashboard, students, attendance, marks, and reports.</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <div class="error-message" id="errorMessage"></div>
            <button type="submit" class="login-btn">Login</button>
        </form>

        
    </div>

    <script src="login.js"></script>
</body>
</html>
